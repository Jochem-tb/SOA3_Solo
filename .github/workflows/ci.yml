name: Avans DevOps CI Pipeline

on:
    push:
        branches:
            - main

jobs:
    build-test-analyze:
        name: Build, Test & Analyze
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0 # Required for SonarCloud Git history analysis

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: "10.x"

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: 17
                  distribution: "zulu" # SonarScanner requires Java

            - name: Install SonarCloud scanner
              run: dotnet tool install --global dotnet-sonarscanner

            - name: Begin SonarCloud analysis
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
              run: |
                  dotnet sonarscanner begin \
                    /k:"Jochem-tb_SOA3_Solo" \
                    /o:"jochem-tb" \
                    /d:sonar.token="$SONAR_TOKEN" \
                    /d:sonar.host.url="https://sonarcloud.io" \
                    /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"

            - name: Build
              run: dotnet build --no-incremental

            - name: Test and collect coverage
              run: dotnet test --no-build --verbosity normal --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

            - name: End SonarCloud analysis
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
              run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

    deploy:
        name: Deploy
        runs-on: ubuntu-latest
        needs: build-test-analyze

        steps:
            - name: Deploy placeholder
              run: echo "Quality Gate passed, tests are green — deploying application!"
