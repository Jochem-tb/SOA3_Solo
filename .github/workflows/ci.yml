name: CI

on:
    push:
        branches:
            - main

jobs:
    build-test-analyze:
        name: Build, Test & SonarCloud
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # SonarCloud needs full history for blame/PR analysis

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.x"

            - name: Build
              run: dotnet build --no-incremental

            - name: Test
              run: dotnet test --no-build
